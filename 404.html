<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Você recebeu um Insight - Ecos Labs</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7; 
            color: #1c1c1e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        h1 {
            color: #58AEA4; 
            font-size: 2.5rem;
            margin-bottom: 5px;
        }
        p {
            font-size: 1.1rem;
            color: #8e8e93;
            margin-bottom: 30px;
        }
        /* Estilo do Botão da App Store */
        .app-store-btn {
            background-color: #1c1c1e;
            color: white;
            padding: 16px 32px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
        }
        .app-store-btn:hover { 
            transform: scale(1.05); 
        }
    </style>
</head>
<body>
    <h1>Ecos</h1>
    <p>Alguém compartilhou um insight com você.<br>Baixe o aplicativo para ler o conteúdo e criar seu laboratório.</p>
    
    <a href="https://apps.apple.com/us/app/ecos-sua-segunda-mente/id6754569860" class="app-store-btn">Baixar Ecos</a>

    <p style="font-size: 0.8rem; margin-top: 50px;">Sistema de Universal Links Ativo ⚡️</p>
</body>
</html>
